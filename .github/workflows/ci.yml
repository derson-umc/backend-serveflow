name: CI

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build (skip tests)
        run: mvn -B -ntp -DskipTests package

      - name: Run tests
        env:
          APPLICATION_NAME: serveflow-ci
          ROOT_PASSWORD: ci-root-password-123
          JWT_SECRET: ci-secret-32-bytes-min-1234567890ab
        run: mvn -B -ntp test

      - name: Upload jar artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: serveflow-jar
          path: target/serveflow-*.jar
          retention-days: 7
