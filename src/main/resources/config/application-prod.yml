spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:6543}/${POSTGRES_DB:postgres}?prepareThreshold=0&sslmode=require
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false
    validate-on-migrate: true

app:
  swagger:
    enabled: false

logging:
  level:
    com.serveflow: WARN
    org.hibernate: ERROR
    root: ERROR
