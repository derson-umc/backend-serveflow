spring:
  datasource:
    # Pooler Supabase (porta 6543 — transaction mode).
    # POSTGRES_HOST deve ser: aws-0-<region>.pooler.supabase.com
    # POSTGRES_USER deve ser: postgres.<project-ref>  (tenant identifier)
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:6543}/${POSTGRES_DB:postgres}?prepareThreshold=0&sslmode=require
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    # Conexão direta ao Supabase (porta 5432 — sem pooler).
    # POSTGRES_FLYWAY_HOST deve ser: db.<project-ref>.supabase.co
    # POSTGRES_FLYWAY_USER deve ser o superuser do Supabase (postgres)
    url: jdbc:postgresql://${POSTGRES_FLYWAY_HOST:${POSTGRES_HOST}}:5432/${POSTGRES_DB:postgres}?sslmode=require
    user: ${POSTGRES_FLYWAY_USER:postgres}
    password: ${POSTGRES_FLYWAY_PASSWORD}

    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false
    validate-on-migrate: true

app:
  swagger:
    enabled: false

logging:
  level:
    com.serveflow: WARN
    org.hibernate: ERROR
    root: ERROR
