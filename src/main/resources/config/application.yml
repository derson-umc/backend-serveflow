spring:
  application:
    name: ${APPLICATION_NAME:serveflow}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:serveflow_db}?prepareThreshold=0
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jackson:
    serialization:
      write-dates-as-timestamps: false

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 26

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
    test-connection: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}   # 15 minutos

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

integration:
  viacep:
    url: ${VIACEP_URL:https://viacep.com.br/ws/{cep}/json/}

app:
  mail:
    from: ${MAIL_FROM}
  delivery:
    default-city: ${DELIVERY_DEFAULT_CITY:Cidade não informada}
    default-state: ${DELIVERY_DEFAULT_STATE:SP}
  upload:
    base-url: ${APP_BASE_URL:http://localhost:8080/api}
  swagger:
    enabled: ${SWAGGER_ENABLED:true}
  audit:
    retention-days: ${AUDIT_RETENTION_DAYS:90}

